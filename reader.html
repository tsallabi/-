<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a0f08">
    <title>القارئ — المكتبة الطيبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&family=Aref+Ruqaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --rdr-bg:#1a0f08; --rdr-bar:rgba(26,15,8,.92); --rdr-text:#f5e6c8; --rdr-gold:#d4af37; --rdr-border:rgba(212,175,55,.25); }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--rdr-bg); font-family: 'Cairo', system-ui, sans-serif; color: var(--rdr-text); }
        .reader-bar { position: sticky; top: 0; z-index: 10; backdrop-filter: blur(14px) saturate(180%); background: var(--rdr-bar); border-bottom: 1px solid var(--rdr-border); display: flex; align-items: center; gap: .5rem; padding: .65rem .85rem; }
        .reader-bar a, .reader-bar button { color: var(--rdr-text); background: rgba(212,175,55,.10); border: 1px solid var(--rdr-border); padding: .5rem .9rem; border-radius: 10px; text-decoration: none; font-family: inherit; font-size: .9rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: .35rem; }
        .reader-bar a:hover, .reader-bar button:hover { background: rgba(212,175,55,.20); border-color: var(--rdr-gold); color: var(--rdr-gold); }
        .reader-bar button:disabled { opacity: .4; cursor: not-allowed; }
        .reader-title { font-weight: 700; flex: 1; text-align: center; padding: 0 .5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 1rem; font-family: 'Aref Ruqaa','Cairo',serif; color: var(--rdr-gold); }
        .reader-page-info { font-size: .85rem; color: var(--rdr-text); opacity: .85; font-weight: 600; padding: 0 .35rem; }
        .reader-stage { min-height: calc(100vh - 56px); display: flex; justify-content: center; padding: 1rem; background: var(--rdr-bg); }
        canvas#pdfCanvas { max-width: 100%; height: auto; box-shadow: 0 10px 40px rgba(0,0,0,.5); background: #fff; border-radius: 4px; }
        .iframe-stage { width: 100%; height: calc(100vh - 56px); border: 0; background: #000; display: block; }
        .reader-message { color: var(--rdr-text); padding: 3rem 1.5rem; text-align: center; font-size: 1.05rem; max-width: 560px; margin: 0 auto; }
        .reader-message h2 { font-family: 'Aref Ruqaa','Cairo',serif; color: var(--rdr-gold); margin: 0 0 1rem; }
        .reader-message a { color: var(--rdr-gold); text-decoration: underline; }
        .reader-loading { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--rdr-border); border-top-color: var(--rdr-gold); border-radius: 50%; animation: spin .8s linear infinite; margin-inline-end: .55rem; vertical-align: middle; }
        .reader-status-line { font-size: .85rem; color: var(--rdr-gold); opacity: .8; margin-top: 1rem; }
        .resume-toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: rgba(58,36,18,.95); color: var(--rdr-gold); border: 1px solid var(--rdr-gold); padding: .75rem 1.25rem; border-radius: 10px; font-family: 'Aref Ruqaa','Cairo',serif; font-size: .9rem; z-index: 50; box-shadow: 0 10px 30px rgba(0,0,0,.5); animation: slideUp .4s ease-out; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translate(-50%,20px); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }
        @media (max-width: 600px) {
            .reader-title { font-size: .85rem; }
            .reader-bar a, .reader-bar button { padding: .45rem .7rem; font-size: .8rem; }
            .reader-page-info { display: none; }
        }
    </style>
</head>
<body>
    <div class="reader-bar">
        <a href="javascript:history.back()" aria-label="عودة">→ عودة</a>
        <span class="reader-title" id="readerTitle">جارٍ التحميل...</span>
        <button id="prevPage" type="button" aria-label="السابق" hidden>→</button>
        <span class="reader-page-info" id="pageInfo" hidden>—</span>
        <button id="nextPage" type="button" aria-label="التالي" hidden>←</button>
        <button id="fullscreenBtn" type="button" aria-label="ملء الشاشة">⛶</button>
    </div>

    <div class="reader-stage" id="readerStage">
        <canvas id="pdfCanvas" hidden></canvas>
        <div class="reader-message" id="readerMessage">
            <span class="reader-loading"></span>
            <span id="msgText">جارٍ تحضير الكتاب في قارئنا...</span>
            <div class="reader-status-line" id="statusLine"></div>
        </div>
    </div>

    <script src="js/user-system.js?v=13"></script>
    <script>
        (function() {
            const params = new URLSearchParams(location.search);
            const pdfUrl = params.get('pdf');
            const title = params.get('title') || 'قراءة';
            const bookId = params.get('bookId') || params.get('id');

            document.getElementById('readerTitle').textContent = title;
            document.title = title + ' — المكتبة الطيبة';

            const stage = document.getElementById('readerStage');
            const canvas = document.getElementById('pdfCanvas');
            const msg = document.getElementById('readerMessage');
            const msgText = document.getElementById('msgText');
            const statusLine = document.getElementById('statusLine');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            const pageInfo = document.getElementById('pageInfo');
            const fsBtn = document.getElementById('fullscreenBtn');

            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
                else document.exitFullscreen?.();
            });

            if (!pdfUrl) { showError('لم يتم تحديد كتاب.'); return; }

            // تحويل روابط archive.org إلى download URL
            const archiveMatch = /archive\.org\/(?:embed|details|download)\/([^/?#]+)/.exec(pdfUrl);
            const archiveSlug = archiveMatch ? archiveMatch[1] : null;
            const directPdfUrl = archiveSlug
                ? `https://archive.org/download/${archiveSlug}/${archiveSlug}.pdf`
                : pdfUrl;

            // الأولوية: PDF.js (قارئنا) ثمّ fallback
            statusLine.textContent = '📖 محاولة الفتح في قارئنا...';
            loadPdfJsScript().then(ok => {
                if (!ok) return useFallback('فشل تحميل PDF.js');
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                tryRenderPDF(directPdfUrl);
            });

            function loadPdfJsScript() {
                return new Promise(resolve => {
                    const s = document.createElement('script');
                    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                    s.onload = () => resolve(typeof pdfjsLib !== 'undefined');
                    s.onerror = () => resolve(false);
                    document.head.appendChild(s);
                });
            }

            function tryRenderPDF(url) {
                statusLine.textContent = '⏳ تحميل الملف...';
                pdfjsLib.getDocument({ url, withCredentials: false }).promise
                    .then(doc => renderPages(doc))
                    .catch(err => {
                        console.warn('PDF.js failed:', err);
                        useFallback(err.message || 'CORS أو لم يوجد');
                    });
            }

            function renderPages(pdfDoc) {
                msg.style.display = 'none';
                canvas.hidden = false;
                const totalPages = pdfDoc.numPages;
                prevBtn.hidden = false; nextBtn.hidden = false; pageInfo.hidden = false;
                const ctx = canvas.getContext('2d');
                let currentPage = 1, rendering = false;

                if (bookId && typeof READING !== 'undefined') {
                    const saved = Math.min(READING.getPage(bookId), totalPages);
                    if (saved > 1) {
                        currentPage = saved;
                        showResumeToast(saved);
                    }
                }

                function renderPage(num) {
                    if (rendering) return;
                    rendering = true;
                    pdfDoc.getPage(num).then(page => {
                        const scale = Math.min(2, Math.max(1, window.innerWidth / 700));
                        const viewport = page.getViewport({ scale });
                        canvas.width = viewport.width;
                        canvas.height = viewport.height;
                        return page.render({ canvasContext: ctx, viewport }).promise;
                    }).then(() => {
                        rendering = false;
                        pageInfo.textContent = `${num} / ${totalPages}`;
                        prevBtn.disabled = num >= totalPages;
                        nextBtn.disabled = num <= 1;
                        if (bookId && typeof READING !== 'undefined') READING.setPage(bookId, num);
                    }).catch(err => { rendering = false; console.error(err); });
                }
                renderPage(currentPage);
                prevBtn.addEventListener('click', () => {
                    if (currentPage < totalPages) { currentPage++; renderPage(currentPage); }
                });
                nextBtn.addEventListener('click', () => {
                    if (currentPage > 1) { currentPage--; renderPage(currentPage); }
                });
                document.addEventListener('keydown', e => {
                    if (e.key === 'ArrowRight') prevBtn.click();
                    else if (e.key === 'ArrowLeft') nextBtn.click();
                });
            }

            function useFallback(reason) {
                console.log('Using fallback because:', reason);
                statusLine.textContent = `⚠️ ${reason} · تجربة بديل...`;
                if (archiveSlug) {
                    // archive.org رابط — استخدم iframe رسمي (لا خيار آخر للروابط التي ترفض CORS)
                    showArchiveIframe(archiveSlug);
                } else {
                    // روابط أخرى — Google Docs Viewer
                    showGoogleViewer(pdfUrl);
                }
            }

            function showArchiveIframe(slug) {
                msg.style.display = 'none';
                const iframe = document.createElement('iframe');
                iframe.className = 'iframe-stage';
                iframe.src = `https://archive.org/embed/${slug}`;
                iframe.allow = 'fullscreen';
                iframe.allowFullscreen = true;
                iframe.referrerPolicy = 'no-referrer';
                stage.style.padding = '0';
                stage.appendChild(iframe);
            }

            function showGoogleViewer(url) {
                msg.style.display = 'none';
                const iframe = document.createElement('iframe');
                iframe.className = 'iframe-stage';
                iframe.src = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
                stage.style.padding = '0';
                stage.appendChild(iframe);
            }

            function showResumeToast(page) {
                const t = document.createElement('div');
                t.className = 'resume-toast';
                t.textContent = `📖 استئنفناك من الصفحة ${page}`;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            }
            function showError(html) {
                canvas.hidden = true;
                msg.innerHTML = `
                    <h2>📖 الكتاب غير متاح حالياً</h2>
                    <p>${html}</p>
                    <p>جرّب <a href="index.html">كتباً أخرى في الصفحة الرئيسية</a>.</p>`;
                msg.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
