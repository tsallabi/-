<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0e1a">
    <title>تفاصيل الكتاب — المكتبة الطيبة</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('taybaa-theme') || 'dark');</script>
</head>
<body>
    <header class="site-header" id="siteHeader">
        <div class="container header-inner">
            <a href="index.html" class="logo" aria-label="الصفحة الرئيسية">
                <span class="logo-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20V3H6.5A2.5 2.5 0 004 5.5v14z"/>
                        <path d="M4 19.5A2.5 2.5 0 016.5 22H20v-5"/>
                    </svg>
                </span>
                <span class="logo-text">
                    <span class="logo-title">المكتبة الطيبة</span>
                    <span class="logo-tag">TAYBAA · LIBRARY</span>
                </span>
            </a>

            <a href="index.html" class="link-btn">→ الرئيسية</a>

            <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع الليلي" type="button">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <article class="book-detail" id="bookDetail" hidden>
            <div class="book-detail-cover">
                <div class="cover-shine">
                    <img id="bookCover" alt="" loading="lazy">
                </div>
            </div>
            <div class="book-detail-info">
                <p class="book-detail-category" id="bookCategory"></p>
                <h1 id="bookTitle"></h1>
                <p class="book-detail-author">للمؤلف: <strong id="bookAuthor"></strong></p>

                <ul class="book-meta-list">
                    <li><span class="meta-icon">📄</span> <span id="bookPages"></span> صفحة</li>
                    <li><span class="meta-icon">👁️</span> <span id="bookViews">0</span> مشاهدة</li>
                    <li><span class="meta-icon">⬇️</span> <span id="bookDownloads">0</span> تحميل</li>
                </ul>

                <div class="book-actions">
                    <a href="#" id="readBtn" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        اقرأ الآن
                    </a>
                    <a href="#" id="downloadBtn" class="btn btn-secondary" download>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        حمّل PDF
                    </a>
                </div>
            </div>
        </article>

        <section class="book-text" id="descriptionSection" hidden>
            <h2>📌 نبذة عن الكتاب</h2>
            <p id="bookDescription"></p>
        </section>

        <section class="book-text" id="introSection" hidden>
            <h2>📝 المقدمة</h2>
            <p id="bookIntro"></p>
        </section>

        <p class="empty-state" id="loadingState">
            <span class="spinner"></span>
            جارٍ تحميل بيانات الكتاب...
        </p>
        <p class="empty-state" id="notFoundState" hidden>عذراً، لم يتم العثور على هذا الكتاب. <a href="index.html">عُد للرئيسية</a></p>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <strong>المكتبة الطيبة</strong>
                <span>نشر العلم. مجاناً.</span>
            </div>
            <p class="footer-copy">© <span id="year"></span> TAYBAA-LIBRARY · مشروع مفتوح للقراء</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/firebase-counter.js"></script>
    <script src="js/book.js"></script>
</body>
</html>
