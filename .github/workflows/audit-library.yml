name: 🩺 فحص المكتبة الشامل

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'حد أقصى للفحص (فارغ = كل الكتب)'
        required: false
        default: ''
        type: string
  schedule:
    # أسبوعيّاً كل أحد في 4 صباحاً UTC
    - cron: '0 4 * * 0'
  push:
    branches:
      - main
    paths:
      - '.triggers/audit.txt'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: claude/online-library-design-ROC6E
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: حساب الحالة قبل الفحص
        run: |
          echo "عدد الكتب قبل الفحص:"
          for f in data/books-sample.json data/books-extra-1.json data/books-extra-2.json data/books-extra-3.json; do
            if [ -f "$f" ]; then
              count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).books.length)")
              echo "  $f: $count"
            fi
          done

      - name: تشغيل الفحص الشامل
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            node scripts/full-audit.mjs "${{ inputs.limit }}"
          else
            node scripts/full-audit.mjs
          fi

      - name: رفع تقرير الفحص كـartifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: /tmp/audit-report.json

      - name: حساب الحالة بعد الفحص
        run: |
          echo "عدد الكتب بعد الفحص:"
          for f in data/books-sample.json data/books-extra-1.json data/books-extra-2.json data/books-extra-3.json; do
            if [ -f "$f" ]; then
              count=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$f','utf8')).books.length)")
              echo "  $f: $count"
            fi
          done

      - name: دفع التغييرات (مع rebase آمن)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "ℹ️ لا تغييرات (المكتبة سليمة)"
            exit 0
          fi

          # نُدخر التغييرات في commit محلي على branch مؤقت
          git commit -m "🩺 audit: فحص شامل — حذف الكتب المعطّلة + URL مباشر لـPDF.js"

          # دفع مع إعادة محاولة + rebase لتفادي السباق
          BRANCH=claude/online-library-design-ROC6E
          for attempt in 1 2 3 4 5; do
            echo "🔄 محاولة الدفع رقم $attempt..."
            if git push origin HEAD:$BRANCH; then
              echo "✅ تمّ الدفع — Cloudflare يعيد البناء الآن"
              exit 0
            fi
            echo "⚠️ الدفع مرفوض — أعيد الـrebase على آخر نسخة من $BRANCH"
            git fetch origin $BRANCH
            # rebase التغييرات على آخر remote
            if ! git rebase origin/$BRANCH; then
              echo "❌ فشل الـrebase تلقائياً — قد توجد تعارضات في data/"
              # في حالة التعارض، نُفضّل تغييراتنا (الفحص يحذف الكتب المعطّلة عن قصد)
              git checkout --theirs data/ || true
              git add data/
              git rebase --continue || git rebase --abort
            fi
            sleep $((attempt * 2))
          done
          echo "❌ فشل الدفع بعد 5 محاولات"
          exit 1
