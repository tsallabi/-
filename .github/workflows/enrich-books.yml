name: 🔍 إثراء بيانات الكتب (أغلفة وروابط)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'عمليّة التنفيذ'
        required: true
        default: 'covers+pdfs'
        type: choice
        options:
          - 'covers+pdfs'
          - 'covers-only'
          - 'pdfs-only'

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run enrichment script
        env:
          MODE: ${{ github.event.inputs.mode }}
        run: python scripts/enrich_books.py

      - name: Commit & push if changed
        run: |
          git config user.name 'taybaa-bot'
          git config user.email 'bot@taybaa-library.local'
          git add data/
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m "bot: enrich book covers/PDFs from archive.org + Google Books"
            git push
          fi
